<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Corner">
<meta name="theme-color" content="#0c0c0c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Corner · Roadmap</title>
<style>
  :root {
    --bg: #0c0c0c;
    --bg2: #161616;
    --bg3: #1f1f1f;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #1D9E75;
    --accent2: #15735a;
    --blue: #378ADD;
    --amber: #BA7517;
    --purple: #7F77DD;
    --coral: #D85A30;
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; }

  /* Header */
  .header {
    padding: calc(var(--safe-top) + 16px) 20px 16px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; }
  .header h1 span { color: var(--accent); }
  .days-badge {
    font-size: 11px; font-weight: 500;
    background: var(--bg3); color: var(--text2);
    padding: 4px 10px; border-radius: 100px;
    border: 0.5px solid var(--border2);
  }
  .prog-wrap { margin-top: 14px; }
  .prog-bar-bg { background: var(--bg3); border-radius: 100px; height: 4px; overflow: hidden; }
  .prog-bar-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.5s ease; }
  .prog-labels { display: flex; justify-content: space-between; margin-top: 6px; }
  .prog-labels span { font-size: 11px; color: var(--text3); }
  .prog-labels .prog-pct { color: var(--accent); font-weight: 500; }

  /* Scroll area */
  .scroll { flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--safe-bot) + 20px); }

  /* Phase cards */
  .phase { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .phase-hdr {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
    user-select: none; -webkit-user-select: none;
    transition: background 0.15s;
  }
  .phase-hdr:active { background: var(--bg3); }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .phase-info { flex: 1; min-width: 0; }
  .phase-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .phase-period { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .phase-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .phase-cnt { font-size: 12px; color: var(--text3); }
  .badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
    padding: 3px 8px; border-radius: 100px;
    text-transform: uppercase;
  }
  .badge-done { background: rgba(29,158,117,0.15); color: var(--accent); }
  .badge-active { background: rgba(55,138,221,0.15); color: var(--blue); }
  .badge-todo { background: var(--bg3); color: var(--text3); }
  .chevron { font-size: 13px; color: var(--text3); transition: transform 0.25s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  /* Tasks */
  .tasks-wrap { border-top: 0.5px solid var(--border); }
  .task {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .task:last-of-type { border-bottom: none; }
  .cb-wrap { padding-top: 1px; flex-shrink: 0; }
  input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
    border-radius: 4px;
  }
  .task-text { font-size: 14px; line-height: 1.45; color: var(--text); flex: 1; }
  .task-text.done { color: var(--text3); text-decoration: line-through; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 16px; padding: 0 2px;
    flex-shrink: 0; line-height: 1;
    transition: color 0.15s;
  }
  .del-btn:active { color: #E24B4A; }

  /* Add task */
  .add-wrap { padding: 10px 16px 14px; }
  .add-row { display: flex; gap: 8px; align-items: center; }
  .add-input {
    flex: 1; font-size: 14px; padding: 9px 12px;
    background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    -webkit-appearance: none;
  }
  .add-input::placeholder { color: var(--text3); }
  .add-input:focus { outline: none; border-color: var(--accent); }
  .add-btn {
    font-size: 20px; line-height: 1;
    background: var(--accent); border: none;
    border-radius: var(--radius-sm); color: #fff;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
  }
  .add-btn:active { background: var(--accent2); }

  /* Summary card */
  .summary {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 16px;
    display: flex; justify-content: space-around;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-val.green { color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .divider { width: 0.5px; background: var(--border); }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1><span>Corner</span> · Roadmap</h1>
    <div class="days-badge" id="days-badge">–</div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-labels">
      <span id="prog-text">0 von 0 erledigt</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
  </div>
</div>

<div class="scroll" id="scroll">
  <div class="summary">
    <div class="stat"><div class="stat-val green" id="s-done">0</div><div class="stat-lbl">Erledigt</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="stat-val" id="s-open">0</div><div class="stat-lbl">Offen</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="stat-val" id="s-days">–</div><div class="stat-lbl">Tage noch</div></div>
  </div>
  <div id="phases"></div>
</div>

<script>
const PHASES = [
  { id:'p1', name:'IA Cleanup', period:'Woche 1 · Tage 1–2', color:'#1D9E75',
    tasks:[
      {id:'p1t1', text:'Social-Bereich komplett streichen (Verwerfen-Entscheidung final)'},
      {id:'p1t2', text:'Body Metrics kürzen: nur Weight Tracking + Heart Rate behalten'},
      {id:'p1t3', text:'Mental Performance auf Backlog setzen (nächstes Semester)'},
      {id:'p1t4', text:'AI-Tools-Entscheidung treffen: Chatbot ja/nein, wenn ja separater Menüpunkt'},
      {id:'p1t5', text:'Bereinigte IA in Figma oder Miro final dokumentieren'},
    ]
  },
  { id:'p2', name:'User Flow', period:'Woche 1 · Tage 3–5', color:'#378ADD',
    tasks:[
      {id:'p2t1', text:'Core Scenario definieren: Fight Camp aktivieren → Gewicht tracken → Coach sieht Status'},
      {id:'p2t2', text:'User Flow für Jamal skizzieren (Hauptflow, Schritt für Schritt)'},
      {id:'p2t3', text:'Edge Cases identifizieren (Gewicht zu weit über Ziel, Coach nicht verbunden)'},
      {id:'p2t4', text:'User Flow in Figma visualisieren und beschriften'},
      {id:'p2t5', text:'Review: Ist der emotionale Moment „Was soll ich essen?" abgedeckt?'},
    ]
  },
  { id:'p3', name:'Lo-Fi Wireframes', period:'Woche 2', color:'#BA7517',
    tasks:[
      {id:'p3t1', text:'Key Screens festlegen: Dashboard, Fight Camp Setup, Gewicht eintragen, Verlaufskurve, Coach-View, Gegner-Profil, Pre-Fight Checkliste'},
      {id:'p3t2', text:'Wireframe: Dashboard / Home Screen (Countdown, Gewichtsstatus, Tagesplan)'},
      {id:'p3t3', text:'Wireframe: Fight Camp Setup & Aktivierung'},
      {id:'p3t4', text:'Wireframe: Tägliches Gewicht eintragen + Verlaufskurve'},
      {id:'p3t5', text:'Wireframe: Gegner-Profil (Videos, Notizen, Stärken/Schwächen)'},
      {id:'p3t6', text:'Wireframe: Coach-Übersicht (Read-only, passiver Status)'},
      {id:'p3t7', text:'Wireframe: Pre-Fight Checkliste'},
      {id:'p3t8', text:'Internes Review: Navigation klar? Flow in unter 2 Min bedienbar?'},
    ]
  },
  { id:'p4', name:'Hi-Fi Design', period:'Woche 3–4', color:'#7F77DD',
    tasks:[
      {id:'p4t1', text:'Design System aufsetzen: Farben, Typografie, Komponenten-Bibliothek'},
      {id:'p4t2', text:'Hi-Fi: Dashboard Screen (Countdown prominent, Gewicht, Tagesplan)'},
      {id:'p4t3', text:'Hi-Fi: Fight Camp Setup Screen'},
      {id:'p4t4', text:'Hi-Fi: Gewichtstracking + Kurve mit Cut-Zielpfad'},
      {id:'p4t5', text:'Hi-Fi: Gegner-Profil Screen'},
      {id:'p4t6', text:'Hi-Fi: Coach-Übersicht Screen'},
      {id:'p4t7', text:'Hi-Fi: Pre-Fight Checkliste'},
      {id:'p4t8', text:'States & Micro-Interactions definieren (leerer Zustand, Erfolgs-Feedback)'},
      {id:'p4t9', text:'Dark Mode prüfen / definieren'},
    ]
  },
  { id:'p5', name:'Prototyp & Abgabe', period:'Woche 4 · letzte Tage', color:'#D85A30',
    tasks:[
      {id:'p5t1', text:'Figma Click-through Prototyp verlinken (alle 7 Screens verbunden)'},
      {id:'p5t2', text:'Selbsttest: Jamal-Szenario komplett durchspielen'},
      {id:'p5t3', text:'Präsentation vorbereiten (Persona, Journey Map, IA, Prototyp)'},
      {id:'p5t4', text:'Peer-Feedback einholen (Kommilitone oder jemand aus dem Gym)'},
      {id:'p5t5', text:'Abgabe final einreichen'},
    ]
  }
];

const DEADLINE = new Date('2026-06-16');
const SK_STATE = 'corner_state_v1';
const SK_OPEN  = 'corner_open_v1';

let state = {};
let open  = { p1: true };

function load() {
  try { state = JSON.parse(localStorage.getItem(SK_STATE) || '{}'); } catch(e) { state = {}; }
  try { open  = JSON.parse(localStorage.getItem(SK_OPEN)  || '{"p1":true}'); } catch(e) { open = {p1:true}; }
}
function save() {
  localStorage.setItem(SK_STATE, JSON.stringify(state));
  localStorage.setItem(SK_OPEN, JSON.stringify(open));
}

function daysLeft() {
  return Math.max(0, Math.ceil((DEADLINE - new Date()) / 864e5));
}

function allTasks(ph) {
  return [...ph.tasks, ...(state['cx_'+ph.id] || [])];
}

function stats() {
  let total=0, done=0;
  PHASES.forEach(ph => allTasks(ph).forEach(t => { total++; if(state[t.id]) done++; }));
  return { total, done };
}

function phaseStatus(ph) {
  const tasks = allTasks(ph);
  const done = tasks.filter(t => state[t.id]).length;
  if(!tasks.length) return 'todo';
  if(done === tasks.length) return 'done';
  if(done > 0) return 'active';
  return 'todo';
}

function render() {
  const { total, done } = stats();
  const pct = total ? Math.round(done / total * 100) : 0;
  const dl = daysLeft();

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = done + ' von ' + total + ' erledigt';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('days-badge').textContent = dl + ' Tage';
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-open').textContent = total - done;
  document.getElementById('s-days').textContent = dl;

  const container = document.getElementById('phases');
  container.innerHTML = '';

  PHASES.forEach(ph => {
    const tasks = allTasks(ph);
    const doneCnt = tasks.filter(t => state[t.id]).length;
    const status = phaseStatus(ph);
    const isOpen = !!open[ph.id];

    const badgeMap = { done:'badge-done', active:'badge-active', todo:'badge-todo' };
    const badgeTextMap = { done:'Fertig', active:'Läuft', todo:'Offen' };

    const card = document.createElement('div');
    card.className = 'phase';

    const hdr = document.createElement('div');
    hdr.className = 'phase-hdr';
    hdr.innerHTML = `
      <div class="dot" style="background:${ph.color}"></div>
      <div class="phase-info">
        <div class="phase-name">${ph.name}</div>
        <div class="phase-period">${ph.period}</div>
      </div>
      <div class="phase-right">
        <span class="phase-cnt">${doneCnt}/${tasks.length}</span>
        <span class="badge ${badgeMap[status]}">${badgeTextMap[status]}</span>
        <span class="chevron ${isOpen ? 'open' : ''}">▾</span>
      </div>
    `;
    hdr.addEventListener('click', () => {
      open[ph.id] = !open[ph.id];
      save(); render();
    });
    card.appendChild(hdr);

    if (isOpen) {
      const wrap = document.createElement('div');
      wrap.className = 'tasks-wrap';

      tasks.forEach(t => {
        const row = document.createElement('div');
        row.className = 'task';
        const isCustom = t.id.startsWith('cx_');
        row.innerHTML = `
          <div class="cb-wrap">
            <input type="checkbox" id="${t.id}" ${state[t.id] ? 'checked' : ''}>
          </div>
          <label class="task-text ${state[t.id] ? 'done' : ''}" for="${t.id}">${t.text}</label>
          ${isCustom ? `<button class="del-btn" data-del="${t.id}" data-ph="${ph.id}">✕</button>` : ''}
        `;
        row.querySelector('input').addEventListener('change', e => {
          state[t.id] = e.target.checked;
          save(); render();
        });
        if (isCustom) {
          row.querySelector('.del-btn').addEventListener('click', e => {
            e.stopPropagation();
            const key = 'cx_' + ph.id;
            state[key] = (state[key] || []).filter(x => x.id !== t.id);
            delete state[t.id];
            save(); render();
          });
        }
        wrap.appendChild(row);
      });

      // Add task row
      const addWrap = document.createElement('div');
      addWrap.className = 'add-wrap';
      addWrap.innerHTML = `
        <div class="add-row">
          <input class="add-input" type="text" placeholder="Eigenen Task hinzufügen...">
          <button class="add-btn">+</button>
        </div>
      `;
      const inp = addWrap.querySelector('.add-input');
      const btn = addWrap.querySelector('.add-btn');
      const addTask = () => {
        const val = inp.value.trim();
        if (!val) return;
        const key = 'cx_' + ph.id;
        if (!state[key]) state[key] = [];
        state[key].push({ id: 'cx_' + Date.now(), text: val });
        inp.value = '';
        save(); render();
        // Re-open and scroll to phase
        open[ph.id] = true;
      };
      btn.addEventListener('click', addTask);
      inp.addEventListener('keydown', e => { if(e.key === 'Enter') { addTask(); e.preventDefault(); } });

      wrap.appendChild(addWrap);
      card.appendChild(wrap);
    }

    container.appendChild(card);
  });
}

load();
render();
</script>
</body>
</html>
